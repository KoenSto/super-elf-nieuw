<script>
/* ============ TAB: Tussenstand ============ */
let standRonde = 1;
let standSortKey = 'totaal';
let standSortDir = 'desc';
function initStandTab(){
  standRonde = STATE.huidigeRonde;
  const sel = document.getElementById('standRondeSelect');
  sel.innerHTML = '';
  for(let i=1;i<=34;i++){
    const o = document.createElement('option');
    o.value = i; o.textContent = 'Ronde ' + i;
    sel.appendChild(o);
  }
  sel.value = standRonde;
  sel.addEventListener('change', ()=>{ standRonde = Number(sel.value); renderStand(); });
  document.getElementById('btnPrintRonde').addEventListener('click', printRondeUitslag);
  renderStand();
}
// Bouwt een losse, printvriendelijke ranglijst van alle teams op basis van hun live score in de
// gekozen speelronde (dezelfde berekening als de kolom "ronde live" hierboven), met de winnaar(s)
// van die ronde gemarkeerd, en start direct het browser-printvenster (ook te gebruiken als PDF).
function printRondeUitslag(){
  const ronde = standRonde;
  buildTeamList();
  const rijen = TEAM_LIST.map(team=>{
    const live = liveTotaalRonde(team, ronde);
    return {team, score: live.total, gevonden: live.gevonden};
  }).sort((a,b)=> b.score - a.score);
  const maxScore = rijen.length ? rijen[0].score : null;
  const winnaars = rijen.filter(r=> maxScore!==null && r.score===maxScore).map(r=>r.team.teamnaam);
  const winnaarTekst = winnaars.length>1
    ? `Gedeelde winst deze ronde voor: ${winnaars.map(esc).join(', ')}`
    : (winnaars.length===1 ? `Winnaar speelronde ${ronde}: ${esc(winnaars[0])}` : 'Nog geen scores voor deze ronde.');
  const rijenHtml = rijen.map((r,i)=>{
    const isWinnaar = maxScore!==null && r.score===maxScore;
    return `<tr style="${isWinnaar?'font-weight:700;':''}border-bottom:1px solid #ddd;">
      <td style="padding:6px 8px;">${i+1}</td>
      <td style="padding:6px 8px;">${isWinnaar?'🏆 ':''}${esc(r.team.teamnaam)}</td>
      <td style="padding:6px 8px;color:#666;">${esc(r.team.speler)}</td>
      <td style="padding:6px 8px;text-align:right;">${r.score}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="4" style="padding:10px;">Nog geen teams aangemaakt.</td></tr>';
  const datumTekst = new Date().toLocaleDateString('nl-NL', {day:'numeric', month:'long', year:'numeric'});
  document.getElementById('printRondeUitslag').innerHTML = `
    <div style="font-family:'DM Sans',Arial,sans-serif;padding:30px;color:#222;">
      <h1 style="margin:0 0 4px;font-size:22px;">⚽ Super Elf — Speelronde ${ronde}</h1>
      <div style="color:#666;font-size:12px;margin-bottom:16px;">Gegenereerd op ${datumTekst}</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:20px;">${winnaarTekst}</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead><tr style="border-bottom:2px solid #333;text-align:left;">
          <th style="padding:6px 8px;">#</th><th style="padding:6px 8px;">Team</th><th style="padding:6px 8px;">Speler</th><th style="padding:6px 8px;text-align:right;">Score ronde ${ronde}</th>
        </tr></thead>
        <tbody>${rijenHtml}</tbody>
      </table>
    </div>`;
  window.print();
}
const STAND_COLUMNS = [
  {key:'rank', label:'#', sortable:false},
  {key:'team', label:'Team', sortable:true},
  {key:'speler', label:'Speler', sortable:true},
  {key:'live', label:'Ronde live', sortable:true},
  {key:'orig', label:'Ronde origineel', sortable:true},
  {key:'diff', label:'Verschil', sortable:false},
  {key:'p1', label:'P1', sortable:true},
  {key:'p2', label:'P2', sortable:true},
  {key:'p3', label:'P3', sortable:true},
  {key:'p4', label:'P4', sortable:true},
  {key:'totaal', label:'Totaal', sortable:true},
];
function renderStand(){
  const ronde = standRonde;
  const sel = document.getElementById('standRondeSelect');
  if(sel && Number(sel.value)!==ronde) sel.value = ronde;
  let rows = TEAM_LIST.map(team=>{
    const live = liveTotaalRonde(team, ronde);
    const orig = origineelRonde(team, ronde);
    const diff = orig!==null ? live.total-orig : null;
    return {
      team, live: live.total, gevonden: live.gevonden, orig, diff,
      p1: periodeTotaal(team,'periode1'), p2: periodeTotaal(team,'periode2'),
      p3: periodeTotaal(team,'periode3'), p4: periodeTotaal(team,'periode4'),
      totaal: seizoenTotaal(team)
    };
  });
  rows.sort((a,b)=>{
    let av, bv;
    if(standSortKey==='team'){ av=a.team.teamnaam.toLowerCase(); bv=b.team.teamnaam.toLowerCase(); }
    else if(standSortKey==='speler'){ av=a.team.speler.toLowerCase(); bv=b.team.speler.toLowerCase(); }
    else { av = a[standSortKey]; bv = b[standSortKey]; av = av==null?-Infinity:av; bv = bv==null?-Infinity:bv; }
    if(av<bv) return standSortDir==='asc' ? -1 : 1;
    if(av>bv) return standSortDir==='asc' ? 1 : -1;
    return 0;
  });
  const arrow = (key)=> standSortKey===key ? (standSortDir==='asc'?' ▲':' ▼') : '';
  const per = DATA.spelregels.periodes || {};
  let html = '<table><thead><tr>';
  STAND_COLUMNS.forEach(c=>{
    let title = '';
    if(c.key==='live'){ c = {...c, label:`Ronde ${ronde} live`}; }
    if(c.key==='orig'){ c = {...c, label:`Ronde ${ronde} origineel`}; }
    if(['p1','p2','p3','p4'].includes(c.key)){
      const p = per['periode'+c.key.slice(1)];
      if(p) title = `title="Ronde ${p.van} t/m ${p.tot}"`;
    }
    if(c.sortable){
      html += `<th ${title} style="cursor:pointer;user-select:none;" data-sort-key="${c.key}">${c.label}${arrow(c.key)}</th>`;
    } else {
      html += `<th ${title}>${c.label}</th>`;
    }
  });
  html += '</tr></thead><tbody>';
  rows.forEach((r,i)=>{
    html += `<tr style="cursor:pointer" data-goto-team="${r.team.key}">
      <td>${i+1}</td><td><b>${esc(r.team.teamnaam)}</b></td><td class="muted">${esc(r.team.speler)}</td>
      <td class="pts">${r.live}</td><td>${r.orig??'-'}</td>
      <td class="${r.diff===0?'diffzero':(r.diff===null?'muted':'diffnonzero')}">${r.diff===null?'-':r.diff}</td>
      <td>${r.p1??'-'}</td><td>${r.p2??'-'}</td><td>${r.p3??'-'}</td><td>${r.p4??'-'}</td>
      <td><b>${r.totaal??'-'}</b></td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('standTable').innerHTML = html;
  document.querySelectorAll('[data-goto-team]').forEach(tr=>{
    tr.addEventListener('click', ()=>{
      selectedTeamKey = tr.dataset.gotoTeam;
      switchTab('teams');
      renderTeamDetail();
      setTimeout(()=>document.getElementById('teamDetail').scrollIntoView({behavior:'smooth'}),50);
    });
  });
  document.querySelectorAll('[data-sort-key]').forEach(th=>{
    th.addEventListener('click', ()=>{
      const key = th.dataset.sortKey;
      if(standSortKey===key){ standSortDir = standSortDir==='asc' ? 'desc' : 'asc'; }
      else { standSortKey = key; standSortDir = (key==='team'||key==='speler') ? 'asc' : 'desc'; }
      renderStand();
    });
  });
}

/* ============ TAB: Spelersdatabase ============ */
function initSpelersTab(){
  const clubSel = document.getElementById('spelerClubFilter');
  DATA.clubs.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; clubSel.appendChild(o); });
  ['spelerClubFilter','spelerPosFilter','spelerSearch'].forEach(id=>document.getElementById(id).addEventListener('input', renderSpelers));
  renderSpelers();
}
function renderSpelers(){
  const club = document.getElementById('spelerClubFilter').value;
  const pos = document.getElementById('spelerPosFilter').value;
  const q = (document.getElementById('spelerSearch').value||'').toLowerCase();
  let list = STATE.players.filter(p=>
    (!club || p.club===club) && (!pos || p.positie===pos) && (!q || p.naam.toLowerCase().includes(q))
  );
  list = list.sort((a,b)=> (b.totaal||0)-(a.totaal||0));
  let html = `<table><thead><tr><th>Club</th><th>Speler</th><th>Pos</th><th>Prijs</th><th>Totaal</th></tr></thead><tbody>`;
  list.slice(0,400).forEach(p=>{
    html += `<tr><td class="muted" style="border-left:4px solid ${posLineColor(p.positie)};">${esc(p.club)}</td><td>${esc(p.naam)}</td><td><span class="badge ${p.positie}">${p.positie}</span></td><td>${fmtGeld(p.prijs)}</td><td class="pts ${p.totaal>0?'pos':(p.totaal<0?'neg':'')}">${p.totaal??0}</td></tr>`;
  });
  html += '</tbody></table>';
  if(list.length>400) html += `<div class="muted small">... en ${list.length-400} meer. Verfijn de zoekopdracht.</div>`;
  document.getElementById('spelersTable').innerHTML = html;
}

/* ============ TAB: Spelregels ============ */
function initRegelsTab(){
  const r = DATA.spelregels;
  const t = r.puntentabel;
  const eventRows = Object.keys(STAT_LABELS).map(k=>
    `<tr><td>${STAT_LABELS[k]}</td><td>${t[k].K}</td><td>${t[k].V}</td><td>${t[k].M}</td><td>${t[k].A}</td></tr>`
  ).join('');
  document.getElementById('regelsPanel').innerHTML = `
    <h2>Spelregels</h2>
    <ul class="small">
      <li>Inleg: €${r.inleg}</li>
      <li>Team: ${r.aantal_spelers} spelers, max ${r.max_per_club} per club</li>
      <li>Budget: ${fmtGeld(r.budget)}</li>
      <li>Toegestane formaties: ${r.formaties.join(', ')}</li>
      <li>Max. wissels tijdens seizoen: ${r.max_wissels}${r.extra_wissel_na_ronde ? ` (na ronde ${r.extra_wissel_na_ronde}: ${r.max_wissels+1})` : ''}</li>
    </ul>
    <h3>Puntentelling</h3>
    <table><thead><tr><th></th><th>Keeper</th><th>Verdediger</th><th>Middenvelder</th><th>Aanvaller</th></tr></thead>
    <tbody><tr><td>Winst</td><td>${t.winst.K}</td><td>${t.winst.V}</td><td>${t.winst.M}</td><td>${t.winst.A}</td></tr>
    <tr><td>Gelijk</td><td>${t.gelijk.K}</td><td>${t.gelijk.V}</td><td>${t.gelijk.M}</td><td>${t.gelijk.A}</td></tr>
    ${eventRows}</tbody></table>
    ${r.periodes ? `<h3 style="margin-top:16px;">Periodes</h3>
    <table><thead><tr><th>Periode</th><th>Speelrondes</th></tr></thead><tbody>${
      Object.entries(r.periodes).map(([k,p],i)=>`<tr><td>Periode ${i+1}</td><td>Ronde ${p.van} t/m ${p.tot}</td></tr>`).join('')
    }</tbody></table>` : ''}
    <h3 style="margin-top:16px;">Indicatie prijzengeld</h3>
    <table><tbody>${Object.entries(r.prijzengeld_indicatie).map(([k,v])=>`<tr><td>${k}</td><td>${v}%</td></tr>`).join('')}</tbody></table>
  `;
}

/* ============ TAB: Data ============ */
function initDataTab(){
  document.getElementById('btnExport').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(STATE,null,1)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'super-elf-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
  });
  document.getElementById('btnImport').addEventListener('click', ()=> document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', (e)=>{
    if(blokkeerAlsKijker()) return;
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        STATE = JSON.parse(reader.result);
        saveState();
        alert('Backup geïmporteerd.');
        location.reload();
      }catch(err){ alert('Kon bestand niet lezen: '+err); }
    };
    reader.readAsText(file);
  });
  document.getElementById('btnReset').addEventListener('click', ()=>{
    if(blokkeerAlsKijker()) return;
    if(confirm('Alle eigen invoer wissen en terugzetten naar de lege seizoen 26-27 basis?')){
      STATE = defaultState();
      saveState();
      location.reload();
    }
  });
  document.getElementById('btnLogoutData').addEventListener('click', ()=>{ doLogout(); });
}

/* ============ TAB SWITCHING & INIT ============ */
function switchTab(name){
  document.querySelectorAll('.tabcontent').forEach(s=>s.style.display='none');
  document.getElementById('tab-'+name).style.display='block';
  document.querySelectorAll('#mainnav button').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
  if(name==='stand') renderStand();
  if(name==='teams') renderTeamsGrid();
  if(name==='clubs') renderClubSquad();
  if(name==='stats') renderStats();
  if(name==='beker') renderBeker();
}
document.getElementById('mainnav').addEventListener('click', (e)=>{
  if(e.target.dataset.tab) switchTab(e.target.dataset.tab);
});

function initLoginForm(){
  const form = document.getElementById('loginForm');
  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    if(!user || !pass){ showLoginScreen('Vul gebruikersnaam en wachtwoord in.'); return; }
    await doLogin(user, pass);
  });
  document.getElementById('btnLogout').addEventListener('click', ()=>{ doLogout(); });
}
function init(){
  STATE = loadState();
  buildTeamList();
  initRondeTab();
  initTeamsTab();
  initStandTab();
  initClubsTab();
  initSpelersTab();
  initRegelsTab();
  initBekerTab();
  initDataTab();
  initLoginForm();
  initAuthGate();
}
init();
</script>
</body>
</html>
