<script>
/* ============ Team helpers ============ */
let TEAM_LIST = []; // [{key, speler, teamnaam, basis, wissels, totaal_weken, tsId}]
function buildTeamList(){
  const naamToId = {};
  Object.entries(DATA.tussenstand).forEach(([id,v])=>{ naamToId[v.naam]=id; });
  TEAM_LIST = Object.entries(STATE.teams).map(([key,t])=>{
    const tsId = naamToId[t.teamnaam] !== undefined ? naamToId[t.teamnaam] : naamToId[t.speler];
    return {key, ...t, tsId};
  });
}
function origineelTotaal(team){
  if(team.tsId===undefined) return null;
  return DATA.tussenstand[team.tsId].weken['Totaal'];
}
function origineelRonde(team, ronde){
  if(team.tsId===undefined) return null;
  const v = DATA.tussenstand[team.tsId].weken[String(ronde)];
  return v===undefined ? null : v;
}
// Live periode-/seizoenstotalen: som van de live ronde-score (huidige selectie x wedstrijdgegevens)
// over een reeks rondes. Nodig zodra er geen vooraf vastgelegde eindstand is (nieuw seizoen) —
// voor oudere seizoenen met een DATA.tussenstand-snapshot (team.tsId gezet) blijft de vastgelegde
// waarde leidend, zodat dat gedrag niet verandert.
function liveTotaalOverRondes(team, van, tot){
  let som = 0;
  for(let r=van; r<=tot; r++){ som += liveTotaalRonde(team, r).total; }
  return som;
}
function periodeTotaal(team, periodeKey){
  if(team.tsId!==undefined){
    const ts = DATA.tussenstand[team.tsId].weken;
    const kort = 'P' + periodeKey.replace('periode',''); // 'periode1' -> 'P1' (oude opslagvorm)
    const v = ts[kort];
    return v===undefined ? null : v;
  }
  const p = DATA.spelregels.periodes && DATA.spelregels.periodes[periodeKey];
  if(!p) return null;
  return liveTotaalOverRondes(team, p.van, p.tot);
}
function seizoenTotaal(team){
  if(team.tsId!==undefined) return origineelTotaal(team);
  return liveTotaalOverRondes(team, 1, 34);
}
// Alle spelers die dit team NU daadwerkelijk heeft opgesteld: de oorspronkelijke basisspelers die nog
// niet zelf weer vervangen zijn, plus alle wissel-spelers die nog niet zelf weer vervangen zijn. Beide
// soorten records krijgen "laatste_ronde: null" zolang ze actief zijn; zodra iemand wordt uitgewisseld
// wordt dat veld gezet op de laatste ronde dat hij nog meetelde (zie addWissel), zonder het record te
// verwijderen — zo blijft de scoregeschiedenis van iedereen die dit seizoen ooit in het team stond intact.
function isActieveSpeler(p){ return p.laatste_ronde===null || p.laatste_ronde===undefined; }
function getActieveSpelers(team){
  const basisActief = team.basis.map((b,i)=>({...b, _bron:'basis', _idx:i})).filter(isActieveSpeler);
  const wisselsActief = team.wissels.map((w,i)=>({...w, _bron:'wissel', _idx:i})).filter(isActieveSpeler);
  return basisActief.concat(wisselsActief);
}
function getInactieveSpelers(team){
  const basisInactief = team.basis.map((b,i)=>({...b, _bron:'basis', _idx:i})).filter(p=>!isActieveSpeler(p));
  const wisselsInactief = team.wissels.map((w,i)=>({...w, _bron:'wissel', _idx:i})).filter(p=>!isActieveSpeler(p));
  return basisInactief.concat(wisselsInactief);
}
// Wie er in een SPECIFIEKE speelronde daadwerkelijk stond opgesteld — dus niet noodzakelijk de
// spelers die NU actief zijn, maar wie op dat moment (vanaf_ronde t/m laatste_ronde) meetelde. Zo
// toont de basisopstelling voor ronde 1 bijv. weer de oorspronkelijke speler die later is vervangen,
// en pas vanaf de ronde van de wissel de nieuwe speler — precies zoals het toen werkelijk stond.
function getSpelersActiefInRonde(team, ronde){
  const inWindow = p => ronde >= (p.vanaf_ronde||1) && ronde <= (p.laatste_ronde===null||p.laatste_ronde===undefined ? 34 : p.laatste_ronde);
  const basisIn = team.basis.map((b,i)=>({...b, _bron:'basis', _idx:i})).filter(inWindow);
  const wisselsIn = team.wissels.map((w,i)=>({...w, _bron:'wissel', _idx:i})).filter(inWindow);
  return basisIn.concat(wisselsIn);
}
// Defensieve reparatie: als eenzelfde speler (naam) op een team meerdere basis-/wisselrecords heeft
// met overlappende periodes — bijv. omdat hij ooit via "+ speler toevoegen aan basis" per ongeluk
// opnieuw werd toegevoegd terwijl hij al eerder (en toen nog actief) op dit team stond — telden zijn
// punten voor de overlappende rondes dubbel mee. Dit schuift zo'n te vroeg beginnende periode
// automatisch op tot net na het einde van de vorige periode van diezelfde speler, zodat elke ronde nog
// maar door één record geclaimd wordt en er nooit meer dubbel geteld wordt. addBasisSpeler voorkomt
// dit voortaan zelf al (zie onder), maar deze reparatie ruimt ook al bestaande, oude data op.
function repareerOverlappendePeriodes(team){
  let gewijzigd = false;
  const perNaam = {};
  team.basis.concat(team.wissels).forEach(p=>{ (perNaam[p.naam] = perNaam[p.naam] || []).push(p); });
  Object.values(perNaam).forEach(records=>{
    if(records.length<2) return;
    // Records mét einddatum (al vervangen) op hun eindronde sorteren, oudste periode eerst; een
    // record zonder einddatum (nog actief) komt altijd als laatste, want die loopt nog door.
    records.sort((a,b)=>{
      const aTot = isActieveSpeler(a) ? Infinity : a.laatste_ronde;
      const bTot = isActieveSpeler(b) ? Infinity : b.laatste_ronde;
      return aTot - bTot;
    });
    let minVanaf = 1;
    records.forEach(p=>{
      const van = p.vanaf_ronde || 1;
      if(van < minVanaf){ p.vanaf_ronde = minVanaf; gewijzigd = true; }
      const tot = isActieveSpeler(p) ? 34 : p.laatste_ronde;
      minVanaf = tot + 1;
    });
  });
  return gewijzigd;
}
function computeFormatie(team){
  const c = {K:0,V:0,M:0,A:0};
  getActieveSpelers(team).forEach(b=>{ if(c[b.positie]!==undefined) c[b.positie]++; });
  return `${c.V}-${c.M}-${c.A}`;
}
// Budget-11 en reservebank-waarde gaan alleen over spelers die NU nog echt actief staan (een
// vervangen speler telt niet meer mee voor het budget van zijn oude plek — dat budget komt weer vrij
// zodra hij wordt uitgewisseld). Basis-oorsprong en wissel-oorsprong blijven twee gescheiden potjes,
// want alleen de basis-11 heeft een harde budgetcap; wissels hebben een eigen (onbeperkt) budget.
function computeBudget(team){
  const actief = getActieveSpelers(team);
  const basisGebruikt = actief.filter(p=>p._bron==='basis').reduce((s,p)=>s+(p.prijs||0),0);
  const wisselsGebruikt = actief.filter(p=>p._bron==='wissel').reduce((s,p)=>s+(p.prijs||0),0);
  return {
    basisGebruikt, wisselsGebruikt, totaalGebruikt: basisGebruikt+wisselsGebruikt,
    resterend: DATA.spelregels.budget - basisGebruikt,
    overBudget: basisGebruikt > DATA.spelregels.budget,
    aantal: actief.length
  };
}
function getSpelerPuntenInRonde(ronde, naam){
  const rd = STATE.rounds[String(ronde)];
  if(!rd) return null;
  for(const m of rd.matches){
    const resThuis = matchResultaat(m.uitslagThuis, m.uitslagUit);
    const resUit = matchResultaat(m.uitslagUit, m.uitslagThuis);
    for(const sp of m.spelersThuis){ if(sp.naam===naam) return berekenPunten(sp.positie,resThuis,sp); }
    for(const sp of m.spelersUit){ if(sp.naam===naam) return berekenPunten(sp.positie,resUit,sp); }
  }
  return null;
}
// Telt de score van elk basis-/wisselrecord alleen mee binnen zijn eigen actieve periode
// (vanaf_ronde t/m laatste_ronde, waarbij "nog niet gezet" betekent: t/m einde seizoen). Zo stoppen de
// punten van een vervangen speler precies op het moment van de wissel, telt de nieuwe speler pas vanaf
// die ronde mee, en telt een speler die later weer wordt terug gewisseld (twee losse records voor
// dezelfde naam, met niet-overlappende periodes) in elke ronde maar één keer mee.
function liveTotaalRonde(team, ronde){
  let total = 0, gevonden = 0;
  team.basis.concat(team.wissels).forEach(p=>{
    const van = p.vanaf_ronde || 1;
    const tot = (p.laatste_ronde===null || p.laatste_ronde===undefined) ? 34 : p.laatste_ronde;
    if(ronde<van || ronde>tot) return;
    const pts = getSpelerPuntenInRonde(ronde, p.naam);
    if(pts!==null){ total += pts; gevonden++; }
  });
  return {total, gevonden};
}

/* ============ Team mutaties (toevoegen/verwijderen) ============ */
function slugify(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
function addTeam(speler, teamnaam){
  if(blokkeerAlsKijker()) return;
  speler = (speler||'').trim() || 'Nieuwe deelnemer';
  teamnaam = (teamnaam||'').trim() || 'Nieuw team';
  const key = 'custom_' + slugify(teamnaam) + '_' + Date.now();
  STATE.teams[key] = { speler, teamnaam, basis: [], wissels: [], totaal_weken: {} };
  saveState();
  buildTeamList();
  selectedTeamKey = key;
  renderTeamsGrid();
  renderTeamDetail();
  const detailEl = document.getElementById('teamDetail');
  if(detailEl.scrollIntoView) detailEl.scrollIntoView({behavior:'smooth'});
}
function removeTeam(key){
  if(blokkeerAlsKijker()) return;
  const team = STATE.teams[key];
  if(!team) return;
  if(!confirm(`Team "${team.teamnaam}" (${team.speler}) verwijderen? Dit kan niet ongedaan worden gemaakt.`)) return;
  delete STATE.teams[key];
  saveState();
  buildTeamList();
  if(selectedTeamKey===key) selectedTeamKey = null;
  renderTeamsGrid();
  renderTeamDetail();
}
function addBasisSpeler(teamKey, club, naam){
  if(blokkeerAlsKijker()) return;
  const p = STATE.players.find(pl=>pl.club===club && pl.naam===naam);
  if(!p){ alert('Kies een geldige speler.'); return; }
  const team = STATE.teams[teamKey];
  if(getActieveSpelers(team).some(x=>x.naam===naam)){ alert('Deze speler staat al in de basisopstelling.'); return; }
  // "+ speler toevoegen aan basis" is alleen voor spelers die dit team nog nooit heeft gehad: hun
  // punten tellen vanaf ronde 1. Stond deze speler er al eerder op (en is hij ooit vervangen), dan
  // moet hij terugkomen via "wissel doorvoeren" — dat zet de juiste ronde vast en voorkomt dat zijn
  // nieuwe periode overlapt met (en dus dubbel telt met) zijn eerdere periode op dit team.
  if(team.basis.concat(team.wissels).some(x=>x.naam===naam)){
    alert(`${naam} heeft al eerder in dit team gestaan en is op enig moment vervangen. Gebruik "wissel doorvoeren" om hem terug te halen, zodat de puntentelling vanaf de juiste ronde weer meeloopt (en niet dubbel telt met zijn eerdere periode).`);
    return;
  }
  team.basis.push({club:p.club, naam:p.naam, prijs:p.prijs, positie:p.positie, weken:{}, vanaf_ronde:1, laatste_ronde:null});
  saveState(); buildTeamList(); renderTeamDetail();
}
function removeBasisSpeler(teamKey, idx){
  if(blokkeerAlsKijker()) return;
  const team = STATE.teams[teamKey];
  team.basis.splice(idx,1);
  saveState(); buildTeamList(); renderTeamDetail();
}
const WISSEL_TYPES = {
  regulier: {label:'Reguliere wissel', badge:'', telt_mee:true},
  vrij: {label:'Vrije wissel (transfer/contractontbinding)', badge:'flag', telt_mee:false}
};
function addWissel(teamKey, club, naam, vanafRonde, uitNaam, type){
  if(blokkeerAlsKijker()) return;
  const p = STATE.players.find(pl=>pl.club===club && pl.naam===naam);
  if(!p){ alert('Kies een geldige speler om in te wisselen.'); return; }
  const team = STATE.teams[teamKey];
  const actief = getActieveSpelers(team);
  if(actief.some(x=>x.naam===naam)){ alert('Deze speler staat al in dit team.'); return; }
  if(!WISSEL_TYPES[type]) type = 'regulier';
  const ronde = Number(vanafRonde) || STATE.huidigeRonde;

  let vervangenSpeler = null;
  if(actief.length>0){
    if(!uitNaam){ alert('Kies welke speler uit de basisopstelling wordt gewisseld.'); return; }
    const uitEntry = actief.find(x=>x.naam===uitNaam);
    if(!uitEntry){ alert('De geselecteerde uit-speler is niet (meer) actief in dit team.'); return; }
    // Sluit de actieve periode van de uitgaande speler af op de ronde vóór deze wissel: zijn punten
    // blijven zo meetellen t/m die ronde, maar niet meer daarna (zie liveTotaalRonde hierboven).
    const bron = uitEntry._bron==='basis' ? team.basis : team.wissels;
    bron[uitEntry._idx].laatste_ronde = ronde - 1;
    vervangenSpeler = uitEntry;
  }

  const volgnr = team.wissels.length ? Math.max(...team.wissels.map(w=>w.volgnr||0))+1 : 1;
  team.wissels.push({
    volgnr, club:p.club, naam:p.naam, prijs:p.prijs, positie:p.positie, weken:{},
    vanaf_ronde: ronde, laatste_ronde: null, handmatig:true, type,
    vervangenSpeler: vervangenSpeler ? {naam:vervangenSpeler.naam, club:vervangenSpeler.club, positie:vervangenSpeler.positie, prijs:vervangenSpeler.prijs} : null
  });
  STATE.wisselLog.push({
    teamKey, ronde, tijdstip: new Date().toISOString(), type,
    uit: vervangenSpeler ? {naam:vervangenSpeler.naam, club:vervangenSpeler.club} : null,
    in: {naam:p.naam, club:p.club}
  });
  saveState(); buildTeamList(); renderTeamDetail();
}
function removeWissel(teamKey, idx){
  if(blokkeerAlsKijker()) return;
  const team = STATE.teams[teamKey];
  const w = team.wissels[idx];
  if(!w) return;
  if(!confirm(`Wissel van ${w.vervangenSpeler ? w.vervangenSpeler.naam+' naar ' : ''}${w.naam} ongedaan maken? De speler die destijds werd vervangen wordt niet automatisch teruggezet in de basis.`)) return;
  team.wissels.splice(idx,1);
  saveState(); buildTeamList(); renderTeamDetail();
}
function removeActieveSpeler(teamKey, bron, idx){
  if(bron==='basis') removeBasisSpeler(teamKey, idx);
  else removeWissel(teamKey, idx);
}
function removeWisselLogEntry(idx){
  if(blokkeerAlsKijker()) return;
  STATE.wisselLog.splice(idx,1);
  saveState(); renderTeamDetail();
}

/* pending (niet-opgeslagen) keuzes in de "toevoegen"-formuliertjes per team */
const pendingBasisClub = {}, pendingBasisSpeler = {};
const pendingWisselClub = {}, pendingWisselSpeler = {}, pendingWisselRonde = {}, pendingWisselUit = {}, pendingWisselType = {};

function clubOptionsHTML(selected){
  return DATA.clubs.map(c=>`<option value="${esc(c)}" ${c===selected?'selected':''}>${esc(c)}</option>`).join('');
}
// Spelerskeuze met dezelfde pastelkleur-arcering per positie als bij Speelronde, zowel op de losse
// <option>-elementen als (via playerSelectStijl) op het gesloten select-veld zelf.
function playerOptionsHTML(club, selectedNaam){
  const list = playersOfClub(club);
  return list.map(p=>
    `<option value="${esc(p.naam)}" style="background-color:var(--pos${p.positie}-bg);color:var(--pos${p.positie}-text);" ${p.naam===selectedNaam?'selected':''}>${esc(p.naam)} (${p.positie}, ${fmtGeld(p.prijs)})</option>`
  ).join('');
}
function playerSelectStijl(club, selectedNaam){
  const speler = playersOfClub(club).find(p=>p.naam===selectedNaam);
  return speler ? `background-color:var(--pos${speler.positie}-bg);color:var(--pos${speler.positie}-text);font-weight:600;` : '';
}

/* ============ TAB: Teams ============ */
let selectedTeamKey = null;
// Welke ronde er bekeken wordt in de puntenkolom van de Basisopstelling — los van STATE.huidigeRonde
// (dat blijft de ronde waar een NIEUWE wissel standaard op ingaat), zodat je hier vrij door alle
// speelrondes kunt bladeren zonder de rest van de app te beïnvloeden.
let teamsRonde = 1;
function initTeamsTab(){
  buildTeamList();
  teamsRonde = STATE.huidigeRonde;
  const rondeSel = document.getElementById('teamsRondeSelect');
  rondeSel.innerHTML = '';
  for(let i=1;i<=34;i++){
    const o = document.createElement('option');
    o.value = i; o.textContent = 'Ronde ' + i;
    rondeSel.appendChild(o);
  }
  rondeSel.value = teamsRonde;
  rondeSel.addEventListener('change', ()=>{ teamsRonde = Number(rondeSel.value); renderTeamDetail(); });
  document.getElementById('teamSearch').addEventListener('input', renderTeamsGrid);
  document.getElementById('btnAddTeam').addEventListener('click', ()=>{
    const speler = document.getElementById('newTeamSpeler').value;
    const teamnaam = document.getElementById('newTeamNaam').value;
    if(!speler.trim() && !teamnaam.trim()){ alert('Vul minimaal een teamnaam of spelernaam in.'); return; }
    addTeam(speler, teamnaam);
    document.getElementById('newTeamSpeler').value = '';
    document.getElementById('newTeamNaam').value = '';
  });
  renderTeamsGrid();
}
function renderTeamsGrid(){
  const q = (document.getElementById('teamSearch').value||'').toLowerCase();
  const grid = document.getElementById('teamsGrid');
  const sorted = [...TEAM_LIST].sort((a,b)=>(seizoenTotaal(b)||0)-(seizoenTotaal(a)||0));
  grid.innerHTML = '';
  sorted.forEach((team, idx)=>{
    if(q && !(team.teamnaam.toLowerCase().includes(q) || team.speler.toLowerCase().includes(q))) return;
    const card = document.createElement('div');
    card.className = 'team-card';
    card.dataset.teamKey = team.key;
    card.innerHTML = `<div class="rank">#${idx+1}</div>
      <div class="tot">${seizoenTotaal(team)??'-'}</div>
      <div class="name">${esc(team.teamnaam)}</div>
      <div class="sub">${esc(team.speler)}</div>`;
    card.addEventListener('click', ()=>{ selectedTeamKey = team.key; renderTeamDetail(); document.getElementById('teamDetail').scrollIntoView({behavior:'smooth'}); });
    grid.appendChild(card);
  });
}
function sparkline(weken){
  const vals = [];
  for(let i=1;i<=34;i++) vals.push(weken[String(i)] ?? weken[i] ?? null);
  const max = Math.max(1, ...vals.map(v=>v||0));
  return `<div style="display:flex;align-items:flex-end;gap:2px;height:40px;">${vals.map(v=>{
    const h = v==null ? 2 : Math.max(2, Math.round((v/max)*38));
    const color = v==null ? '#333' : (v<0 ? 'var(--neg)':'var(--accent2)');
    return `<div title="${v==null?'geen data':v+' pt'}" style="width:6px;height:${h}px;background:${color};border-radius:2px;"></div>`;
  }).join('')}</div>`;
}
function renderTeamDetail(){
  const el = document.getElementById('teamDetail');
  if(!selectedTeamKey){ el.innerHTML=''; return; }
  const team = TEAM_LIST.find(t=>t.key===selectedTeamKey);
  if(!team){ el.innerHTML=''; return; }
  const budget = computeBudget(team);
  const formatie = computeFormatie(team);
  const ronde = teamsRonde; // bekeken ronde (via dropdown), los van STATE.huidigeRonde
  const live = liveTotaalRonde(team, ronde);

  const actieveSpelers = getActieveSpelers(team); // NU actief — voor wisselen/toevoegen (los van de bekeken ronde)
  const weergegevenSpelers = getSpelersActiefInRonde(team, ronde); // wie in de BEKEKEN ronde stond opgesteld

  // Twee spelers van dezelfde club mogen niet samen in de opstelling staan. Bij een wissel mag een
  // speler van diezelfde club er wel weer voor in de plaats komen (er staat dan nog steeds maar één
  // van die club), maar zodra er in de bekeken ronde per ongeluk toch twee stonden, vallen die rijen
  // op in rood.
  const clubTelling = {};
  weergegevenSpelers.forEach(p=>{ clubTelling[p.club] = (clubTelling[p.club]||0)+1; });
  const dubbeleClubs = new Set(Object.entries(clubTelling).filter(([,n])=>n>1).map(([c])=>c));

  const posOrder = {K:0,V:1,M:2,A:3};
  const weergegevenSorted = [...weergegevenSpelers].sort((a,b)=>posOrder[a.positie]-posOrder[b.positie] || a.naam.localeCompare(b.naam));

  const basisRows = weergegevenSorted.map(b=>{
    const lp = getSpelerPuntenInRonde(ronde, b.naam);
    const foutRij = dubbeleClubs.has(b.club);
    const statusTekst = (b.vanaf_ronde && b.vanaf_ronde>1) ? `sinds ronde ${b.vanaf_ronde} (wissel)` : 'vanaf start';
    // Verwijderen kan alleen voor een speler die NU nog echt actief is (een historische, al
    // afgesloten periode van een eerdere ronde is hier alleen ter info te zien, niet te bewerken).
    const magVerwijderen = canEdit() && isActieveSpeler(b);
    return `<tr${foutRij ? ' class="row-error" title="Twee spelers van dezelfde club mogen niet samen in de basisopstelling staan."' : ''}>
      <td style="border-left:4px solid ${posLineColor(b.positie)};"><span class="badge ${b.positie}">${b.positie}</span></td>
      <td>${esc(b.naam)}</td>
      <td class="muted">${esc(b.club)}${foutRij ? ' <span class="flag flag-danger">dubbele club</span>' : ''}</td>
      <td class="muted">${fmtGeld(b.prijs)}</td>
      <td class="muted small">${statusTekst}</td>
      <td class="pts ${lp>0?'pos':(lp<0?'neg':'')}">${lp===null?'<span class="muted">–</span>':lp}</td>
      <td>${magVerwijderen ? `<span class="close-btn" title="verwijder uit opstelling" data-remove-actief="${team.key}" data-remove-actief-bron="${b._bron}" data-remove-actief-idx="${b._idx}">✕</span>` : ''}</td></tr>`;
  }).join('') || `<tr><td colspan="7" class="muted">Nog geen basisspelers in ronde ${ronde}. Voeg ze hieronder toe.</td></tr>`;

  const wisselLogRows = STATE.wisselLog.map((l,i)=>({l,i})).filter(x=>x.l.teamKey===team.key).sort((a,b)=>(b.l.ronde-a.l.ronde)).map(({l,i})=>{
    const typeInfo = l.type ? WISSEL_TYPES[l.type] : WISSEL_TYPES.regulier;
    return `<tr><td>Ronde ${l.ronde}</td><td>${l.uit ? esc(l.uit.naam)+' <span class="muted small">('+esc(l.uit.club)+')</span>' : '<span class="muted">–</span>'}</td>
      <td>&rarr;</td><td>${esc(l.in.naam)} <span class="muted small">(${esc(l.in.club)})</span></td>
      <td><span class="${typeInfo.badge||'pill'}" style="font-size:10px;">${typeInfo.telt_mee?'regulier':'vrij (transfer)'}</span></td>
      <td>${canEdit() ? `<span class="close-btn" title="verwijder logregel" data-remove-wissellog="${i}">✕</span>` : ''}</td></tr>`;
  }).join('') || '<tr><td colspan="6" class="muted">Nog geen wissels gelogd voor dit team.</td></tr>';

  const pbClub = pendingBasisClub[team.key] || DATA.clubs[0];
  const pbSpeler = pendingBasisSpeler[team.key] || (playersOfClub(pbClub)[0] && playersOfClub(pbClub)[0].naam) || '';
  const pwClub = pendingWisselClub[team.key] || DATA.clubs[0];
  const pwSpeler = pendingWisselSpeler[team.key] || (playersOfClub(pwClub)[0] && playersOfClub(pwClub)[0].naam) || '';
  // Een NIEUWE wissel gaat standaard in vanaf de huidige speelronde (STATE.huidigeRonde), niet vanaf
  // de ronde die je hier toevallig aan het bekijken bent via de rondekeuze hierboven.
  const pwRonde = pendingWisselRonde[team.key] || STATE.huidigeRonde;
  const pwUit = pendingWisselUit[team.key] || (actieveSpelers[0] && actieveSpelers[0].naam) || '';
  const pwType = pendingWisselType[team.key] || 'regulier';
  const uitOptionsHTML = actieveSpelers.map(b=>`<option value="${esc(b.naam)}" ${b.naam===pwUit?'selected':''}>${esc(b.naam)} (${b.positie}, ${esc(b.club)})</option>`).join('');
  const typeOptionsHTML = Object.entries(WISSEL_TYPES).map(([k,v])=>`<option value="${k}" ${k===pwType?'selected':''}>${v.label}</option>`).join('');
  const regulierGebruikt = team.wissels.filter(w=>!w.type || WISSEL_TYPES[w.type].telt_mee).length;
  const vrijGebruikt = team.wissels.filter(w=>w.type && !WISSEL_TYPES[w.type].telt_mee).length;

  el.innerHTML = `<div class="panel">
    <span class="close-btn" id="closeTeamDetail">✕ sluiten</span>
    <h2>${esc(team.teamnaam)} <span class="muted small">— ${esc(team.speler)}</span>
      ${canEdit() ? `<button class="btn small danger" style="margin-left:10px;" data-remove-team="${team.key}">team verwijderen</button>` : ''}
    </h2>
    <div class="row" style="margin-bottom:10px;">
      <span class="pill">Formatie: <b>${formatie}</b></span>
      <span class="pill${budget.overBudget?' pill-danger':''}" ${budget.overBudget?'title="Budget basis-11 overschreden!"':''}>Budget basis-11: <b>${fmtGeld(budget.basisGebruikt)}</b> / ${fmtGeld(DATA.spelregels.budget)}${budget.overBudget?' <span class="flag flag-danger">over budget</span>':''}</span>
      <span class="pill">Resterend (basis): <b>${fmtGeld(budget.resterend)}</b></span>
      <span class="pill">Waarde reservebank: <b>${fmtGeld(budget.wisselsGebruikt)}</b> <span class="muted small">(apart budget bij wissel)</span></span>
      <span class="pill">Wissels: <b>${regulierGebruikt}/${maxWisselsVoorRonde(ronde)}</b> regulier${vrijGebruikt>0?` + <b>${vrijGebruikt}</b> vrij (transfer)`:''}</span>
      <span class="pill">Seizoenstotaal: <b>${seizoenTotaal(team)??'-'}</b></span>
    </div>
    ${dubbeleClubs.size>0 ? `<div class="note">Deze opstelling heeft twee spelers van dezelfde club (<b>${[...dubbeleClubs].map(esc).join(', ')}</b>) tegelijk actief staan — hieronder in het rood aangegeven. Dat mag niet: haal er één van uit of wissel hem.</div>` : ''}
    <div class="note">
      Ronde ${ronde}: met de spelers die <b>in die ronde</b> daadwerkelijk opgesteld stonden, toegepast op de wedstrijdgegevens van die ronde, komt dit team op <b class="pts">${live.total}</b> punten (${live.gevonden}/${weergegevenSpelers.length} spelers gevonden).
    </div>
    <h3>Basisopstelling (ronde ${ronde})</h3>
    <div class="note small">Deze tabel toont wie er in ronde ${ronde} echt in de opstelling stond &mdash; kies hierboven een andere ronde om terug of vooruit te kijken. Wissel je iemand, dan verandert de opstelling vanaf de wisselronde; oudere rondes blijven het oorspronkelijke elftal laten zien.</div>
    <table><thead><tr><th>Pos</th><th>Speler</th><th>Club</th><th>Prijs</th><th>Status</th><th>Ronde ${ronde}</th><th></th></tr></thead><tbody>${basisRows}</tbody></table>
    ${canEdit() ? `<div class="row" style="margin-top:8px;">
      <select data-newbasis-club="${team.key}">${clubOptionsHTML(pbClub)}</select>
      <select data-newbasis-speler="${team.key}" style="${playerSelectStijl(pbClub, pbSpeler)}">${playerOptionsHTML(pbClub, pbSpeler)}</select>
      <button class="btn small primary" data-add-basis="${team.key}">+ speler toevoegen aan basis</button>
    </div>` : ''}

    <h3 style="margin-top:18px;">Wissel doorvoeren (max ${maxWisselsVoorRonde(ronde)} regulier + evt. vrije wissels bij transfer)</h3>
    <div class="note small">Een wissel vervangt een speler uit de basisopstelling door een nieuwe speler. De nieuwe speler komt direct in de basisopstelling hierboven te staan; zijn punten tellen vanaf de gekozen ronde, en de punten van de vervangen speler tellen precies tot en met de ronde daarvoor &mdash; ook als diezelfde speler later weer wordt terug gewisseld.</div>
    ${canEdit() ? `<div class="row" style="margin-top:8px;flex-wrap:wrap;">
      ${actieveSpelers.length>0 ? `<label class="small muted">eruit (basis) <select data-newwissel-uit="${team.key}">${uitOptionsHTML}</select></label>` : '<span class="muted small">Geen basisspelers om te wisselen &mdash; wordt direct aan de basisopstelling toegevoegd.</span>'}
      <span class="muted">&rarr;</span>
      <label class="small muted">erin <select data-newwissel-club="${team.key}">${clubOptionsHTML(pwClub)}</select>
      <select data-newwissel-speler="${team.key}" style="${playerSelectStijl(pwClub, pwSpeler)}">${playerOptionsHTML(pwClub, pwSpeler)}</select></label>
      <label class="small muted">vanaf ronde <input type="number" min="1" max="34" value="${pwRonde}" data-newwissel-ronde="${team.key}" style="width:50px;"></label>
      <label class="small muted">type <select data-newwissel-type="${team.key}">${typeOptionsHTML}</select></label>
      <button class="btn small primary" data-add-wissel="${team.key}">+ wissel doorvoeren</button>
    </div>` : ''}

    <h3 style="margin-top:18px;">Wisselhistorie</h3>
    <table><thead><tr><th>Ronde</th><th>Eruit</th><th></th><th>Erin</th><th>Type</th><th></th></tr></thead><tbody>${wisselLogRows}</tbody></table>

    <h3 style="margin-top:18px;">Seizoensverloop (per ronde)</h3>
    ${sparkline(team.totaal_weken)}
  </div>`;
  document.getElementById('closeTeamDetail').addEventListener('click', ()=>{ selectedTeamKey=null; el.innerHTML=''; });
}

/* ---- event delegation voor team-tabblad ---- */
document.addEventListener('change', (e)=>{
  const t = e.target;
  if(t.dataset.newbasisClub){ pendingBasisClub[t.dataset.newbasisClub] = t.value; delete pendingBasisSpeler[t.dataset.newbasisClub]; renderTeamDetail(); }
  else if(t.dataset.newbasisSpeler){ pendingBasisSpeler[t.dataset.newbasisSpeler] = t.value; renderTeamDetail(); }
  else if(t.dataset.newwisselClub){ pendingWisselClub[t.dataset.newwisselClub] = t.value; delete pendingWisselSpeler[t.dataset.newwisselClub]; renderTeamDetail(); }
  else if(t.dataset.newwisselSpeler){ pendingWisselSpeler[t.dataset.newwisselSpeler] = t.value; renderTeamDetail(); }
  else if(t.dataset.newwisselRonde){ pendingWisselRonde[t.dataset.newwisselRonde] = t.value; }
  else if(t.dataset.newwisselUit){ pendingWisselUit[t.dataset.newwisselUit] = t.value; }
  else if(t.dataset.newwisselType){ pendingWisselType[t.dataset.newwisselType] = t.value; }
});
document.addEventListener('click', (e)=>{
  const t = e.target;
  if(t.dataset.addBasis){
    const key = t.dataset.addBasis;
    const club = pendingBasisClub[key] || DATA.clubs[0];
    const naam = pendingBasisSpeler[key] || (playersOfClub(club)[0] && playersOfClub(club)[0].naam);
    addBasisSpeler(key, club, naam);
  }
  if(t.dataset.removeActief!==undefined){
    removeActieveSpeler(t.dataset.removeActief, t.dataset.removeActiefBron, Number(t.dataset.removeActiefIdx));
  }
  if(t.dataset.addWissel){
    const key = t.dataset.addWissel;
    const club = pendingWisselClub[key] || DATA.clubs[0];
    const naam = pendingWisselSpeler[key] || (playersOfClub(club)[0] && playersOfClub(club)[0].naam);
    const ronde = pendingWisselRonde[key] || STATE.huidigeRonde;
    const team = STATE.teams[key];
    const actieveSpelers = team ? getActieveSpelers(team) : [];
    const uitNaam = actieveSpelers.length>0 ? (pendingWisselUit[key] || (actieveSpelers[0] && actieveSpelers[0].naam)) : null;
    const type = pendingWisselType[key] || 'regulier';
    addWissel(key, club, naam, ronde, uitNaam, type);
  }
  if(t.dataset.removeWissellog!==undefined){
    removeWisselLogEntry(Number(t.dataset.removeWissellog));
  }
  if(t.dataset.removeTeam){
    removeTeam(t.dataset.removeTeam);
  }
});
</script>
